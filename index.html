<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitbit Overlapping Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js CDN for interactive graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <h1 class="text-xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-400">Fitbit DuoDash Pro</h1>
        
        <!-- Toggle Views -->
        <div class="bg-slate-950 p-1 rounded-xl border border-slate-800 flex gap-1">
            <button onclick="updateCharts('me')" id="btn-me" class="px-4 py-2 rounded-lg text-sm font-medium transition-all bg-pink-500 text-white">Me</button>
            <button onclick="updateCharts('her')" id="btn-her" class="px-4 py-2 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200">Her</button>
            <button onclick="updateCharts('overlay')" id="btn-overlay" class="px-4 py-2 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200">Overlay</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6 space-y-8">
        <div>
            <h2 id="chart-title" class="text-2xl font-bold text-slate-200">Showing: My Intraday Analytics</h2>
            <p class="text-sm text-slate-400">Interactive timeline charts demonstrating true overlay mapping</p>
        </div>

        <!-- Chart 1: Intraday Sleep Cycles Timeline -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
            <div class="mb-4">
                <h3 class="text-lg font-semibold text-slate-200">Sleep Architecture Timeline</h3>
                <p class="text-xs text-slate-400">Stages: Awake (3), REM (2), Light (1), Deep (0)</p>
            </div>
            <div class="h-64 w-full">
                <canvas id="sleepChart"></canvas>
            </div>
        </div>

        <!-- Chart 2: Intraday Heart Rate Timeline -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
            <div class="mb-4">
                <h3 class="text-lg font-semibold text-slate-200">24-Hour Intraday Heart Rate Overlay</h3>
                <p class="text-xs text-slate-400">Real-time cardiovascular trends measured in BPM</p>
            </div>
            <div class="h-64 w-full">
                <canvas id="hrChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Raw Data sets for testing overlays
        const timeLabels = ["11 PM", "12 AM", "1 AM", "2 AM", "3 AM", "4 AM", "5 AM", "6 AM", "7 AM"];
        const mySleep = [3, 1, 0, 2, 1, 0, 2, 1, 3];
        const herSleep = [3, 2, 1, 0, 0, 1, 2, 2, 3];

        const hrLabels = ["8 AM", "10 AM", "12 PM", "2 PM", "4 PM", "6 PM", "8 PM", "10 PM"];
        const myHR = [65, 72, 85, 90, 68, 115, 95, 62];
        const herHR = [58, 64, 110, 75, 82, 90, 70, 55];

        // Global configuration settings for ChartJS
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#334155';

        // Initialize Sleep Chart
        const ctxSleep = document.getElementById('sleepChart').getContext('2d');
        const sleepChart = new Chart(ctxSleep, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [{
                    label: 'Me (Sleep Stage)',
                    data: mySleep,
                    borderColor: '#f472b6',
                    backgroundColor: 'rgba(244, 114, 182, 0.1)',
                    stepped: true,
                    fill: true
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Initialize Heart Rate Chart
        const ctxHR = document.getElementById('hrChart').getContext('2d');
        const hrChart = new Chart(ctxHR, {
            type: 'line',
            data: {
                labels: hrLabels,
                datasets: [{
                    label: 'Me (BPM)',
                    data: myHR,
                    borderColor: '#f472b6',
                    backgroundColor: 'rgba(244, 114, 182, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Dynamic Toggle Logic
        function updateCharts(view) {
            // Update button visual highlights
            ['me', 'her', 'overlay'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if(v === view) {
                    btn.className = `px-4 py-2 rounded-lg text-sm font-medium transition-all text-white ${view==='me'?'bg-pink-500':view==='her'?'bg-sky-500':'bg-purple-500'}`;
                } else {
                    btn.className = "px-4 py-2 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200";
                }
            });

            document.getElementById('chart-title').innerText = view === 'overlay' 
                ? "Showing: Direct Data Overlay Comparison" 
                : `Showing: ${view.toUpperCase()} Intraday Analytics`;

            if (view === 'me') {
                // Sleep Dataset config
                sleepChart.data.datasets = [{ label: 'Me (Sleep Stage)', data: mySleep, borderColor: '#f472b6', backgroundColor: 'rgba(244, 114, 182, 0.1)', stepped: true, fill: true }];
                // HR Dataset config
                hrChart.data.datasets = [{ label: 'Me (BPM)', data: myHR, borderColor: '#f472b6', backgroundColor: 'rgba(244, 114, 182, 0.1)', tension: 0.4, fill: true }];
            } else if (view === 'her') {
                sleepChart.data.datasets = [{ label: 'Her (Sleep Stage)', data: herSleep, borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', stepped: true, fill: true }];
                hrChart.data.datasets = [{ label: 'Her (BPM)', data: herHR, borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', tension: 0.4, fill: true }];
            } else if (view === 'overlay') {
                // Dual lines layered directly over each other
                sleepChart.data.datasets = [
                    { label: 'Me', data: mySleep, borderColor: '#f472b6', backgroundColor: 'transparent', stepped: true },
                    { label: 'Her', data: herSleep, borderColor: '#38bdf8', backgroundColor: 'transparent', stepped: true }
                ];
                hrChart.data.datasets = [
                    { label: 'Me', data: myHR, borderColor: '#f472b6', backgroundColor: 'rgba(244, 114, 182, 0.05)', tension: 0.4, fill: true },
                    { label: 'Her', data: herHR, borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.05)', tension: 0.4, fill: true }
                ];
            }

            // Tell ChartJS to smoothly animate the new view changes
            sleepChart.update();
            hrChart.update();
        }
    </script>
</body>
</html>
